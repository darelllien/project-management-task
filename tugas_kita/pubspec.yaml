name: tugas_kita
description: "Aplikasi Manajemen Tugas Gamifikasi."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 🏗️ State Management & Architecture
  flutter_riverpod: ^2.5.1

  # 🗄️ Local Database & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3 # Untuk simpan status Onboarding & Theme (Dark/Light)

  # 🔔 Notifikasi & Background Service
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  workmanager: ^0.5.2

  # 🎨 UI, Animasi & Gamifikasi
  lottie: ^3.1.2 # Animasi Splash Screen, Kartun Avatar, Tiket Sobek
  google_fonts: ^6.2.1 # Tipografi dinamis tanpa perlu download file font manual
  flutter_slidable: ^3.0.1 # Efek Swipe-to-Action (geser untuk hapus/selesai di Task List)
  confetti: ^0.7.0 # Animasi perayaan saat naik Pangkat/Level

  # 🛠️ Utilities (Alat Bantu)
  intl: ^0.19.0 # Formatting waktu dan tanggal (contoh: 22 Juli 2026)
  image_picker: ^1.1.2 # Akses Kamera/Galeri untuk Foto Profil
  uuid: ^4.4.0 # Pembuat ID unik otomatis untuk setiap tugas yang diinput

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # ⚙️ Code Generator (Wajib untuk Hive Local DB)
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # 📂 Mendaftarkan folder aset agar bisa dibaca oleh aplikasi
  assets:
    - assets/images/
    - assets/lottie/
    - assets/sounds/
    - assets/icons/
